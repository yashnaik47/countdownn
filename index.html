```html id="mobilefix87"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Birthday Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
  background:linear-gradient(-45deg,#09090f,#111827,#1e1b4b,#312e81);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
  padding:20px;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.bg-glow{
  position:absolute;
  width:350px;
  height:350px;
  background:#7c3aed;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.35;
  top:-100px;
  left:-100px;
  animation:float 6s ease-in-out infinite;
}

.bg-glow2{
  position:absolute;
  width:300px;
  height:300px;
  background:#ec4899;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.25;
  bottom:-100px;
  right:-100px;
  animation:float2 8s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-25px);}
}

@keyframes float2{
  0%,100%{transform:translateX(0);}
  50%{transform:translateX(-25px);}
}

.container{
  position:relative;
  z-index:10;
  width:100%;
  max-width:420px;
  text-align:center;
}

.title{
  font-size:38px;
  font-weight:700;
  line-height:1.2;
  margin-bottom:12px;
  background:linear-gradient(to right,#ffffff,#c4b5fd,#f9a8d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.03);}
}

.subtitle{
  color:#d1d5db;
  font-size:15px;
  margin-bottom:35px;
  letter-spacing:1px;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.box{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);
  border-radius:28px;
  height:150px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 8px 30px rgba(0,0,0,0.35),
    inset 0 0 20px rgba(255,255,255,0.04);
}

.box::before{
  content:'';
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(
    45deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  animation:shine 5s linear infinite;
}

@keyframes shine{
  0%{
    transform:translateX(-100%) rotate(25deg);
  }
  100%{
    transform:translateX(100%) rotate(25deg);
  }
}

.number{
  font-size:52px;
  font-weight:700;
  color:#fff;
  z-index:2;
}

.label{
  margin-top:8px;
  font-size:13px;
  letter-spacing:3px;
  color:#cbd5e1;
  text-transform:uppercase;
  z-index:2;
}

.footer{
  margin-top:30px;
  color:#e5e7eb;
  font-size:14px;
  letter-spacing:1px;
}

.birthday{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:80vh;
  animation:fadeIn 2s ease;
}

.birthday h1{
  font-size:56px;
  line-height:1.1;
  background:linear-gradient(to right,#fff,#f9a8d4,#c4b5fd,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:pulse 2s infinite;
}

.birthday p{
  margin-top:18px;
  color:#f3f4f6;
  font-size:18px;
  padding:0 20px;
  line-height:1.6;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:scale(0.9);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

/* EXTRA MOBILE OPTIMIZATION */

@media(max-width:480px){

  .title{
    font-size:32px;
  }

  .subtitle{
    font-size:14px;
  }

  .countdown{
    gap:12px;
  }

  .box{
    height:130px;
    border-radius:24px;
  }

  .number{
    font-size:42px;
  }

  .label{
    font-size:11px;
    letter-spacing:2px;
  }

  .birthday h1{
    font-size:42px;
  }

  .birthday p{
    font-size:16px;
  }

}

</style>
</head>

<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="container" id="app">

  <div class="title">
    Birthday Countdown ✨
  </div>

  <div class="subtitle">
    Sunday, 10 May • 12:00 AM
  </div>

  <div class="countdown">

    <div class="box">
      <div class="number" id="days">00</div>
      <div class="label">Days</div>
    </div>

    <div class="box">
      <div class="number" id="hours">00</div>
      <div class="label">Hours</div>
    </div>

    <div class="box">
      <div class="number" id="minutes">00</div>
      <div class="label">Minutes</div>
    </div>

    <div class="box">
      <div class="number" id="seconds">00</div>
      <div class="label">Seconds</div>
    </div>

  </div>

  <div class="footer">
    The celebration starts soon 🎉
  </div>

</div>

<script>

const targetDate = new Date("May 10, 2026 00:00:00").getTime();

function updateCountdown(){

  const now = new Date().getTime();
  const distance = targetDate - now;

  if(distance < 0){

    document.getElementById("app").innerHTML = `

      <div class="birthday">

        <h1>
          Happy Birthday ✨
        </h1>

        <p>
          Wishing you a day filled with love, happiness, laughter and unforgettable memories 🎂🎉
        </p>

      </div>

    `;

    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("days").innerHTML = String(days).padStart(2,'0');
  document.getElementById("hours").innerHTML = String(hours).padStart(2,'0');
  document.getElementById("minutes").innerHTML = String(minutes).padStart(2,'0');
  document.getElementById("seconds").innerHTML = String(seconds).padStart(2,'0');

}

setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
```

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Countdown</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81,#0f172a);
      background-size:400% 400%;
      animation:bgMove 12s ease infinite;
      padding:20px;
      position:relative;
    }

    @keyframes bgMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .glow{
      position:absolute;
      width:350px;
      height:350px;
      background:rgba(255,255,255,0.08);
      border-radius:50%;
      filter:blur(90px);
      animation:float 8s ease-in-out infinite;
    }

    .glow:nth-child(1){
      top:-100px;
      left:-100px;
      background:#7c3aed;
    }

    .glow:nth-child(2){
      bottom:-120px;
      right:-120px;
      background:#ec4899;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(30px);
      }
    }

    .container{
      width:100%;
      max-width:1000px;
      text-align:center;
      z-index:2;
    }

    .title{
      color:white;
      font-size:clamp(2rem,5vw,4rem);
      font-weight:700;
      margin-bottom:15px;
      letter-spacing:2px;
      text-shadow:0 0 20px rgba(255,255,255,0.3);
    }

    .subtitle{
      color:rgba(255,255,255,0.75);
      margin-bottom:45px;
      font-size:clamp(0.95rem,2vw,1.2rem);
    }

    .countdown{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
    }

    .box{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:24px;
      padding:25px 10px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.25),
        inset 0 0 20px rgba(255,255,255,0.03);
      transition:0.3s ease;
    }

    .box:hover{
      transform:translateY(-6px) scale(1.03);
    }

    .number{
      color:white;
      font-size:clamp(2.2rem,6vw,5rem);
      font-weight:700;
      line-height:1;
      text-shadow:0 0 20px rgba(255,255,255,0.25);
    }

    .label{
      margin-top:12px;
      color:rgba(255,255,255,0.75);
      font-size:clamp(0.8rem,2vw,1rem);
      text-transform:uppercase;
      letter-spacing:2px;
    }

    .birthday{
      display:none;
      animation:pop 1s ease forwards;
    }

    .birthday h1{
      color:white;
      font-size:clamp(2.5rem,9vw,6rem);
      text-shadow:
        0 0 15px #fff,
        0 0 30px #ff4fd8,
        0 0 60px #7c3aed;
      animation:glowText 2s infinite alternate;
    }

    .birthday p{
      margin-top:20px;
      color:rgba(255,255,255,0.8);
      font-size:clamp(1rem,3vw,1.4rem);
    }

    @keyframes glowText{
      from{
        text-shadow:
          0 0 10px #fff,
          0 0 20px #ff4fd8,
          0 0 40px #7c3aed;
      }
      to{
        text-shadow:
          0 0 20px #fff,
          0 0 40px #ff4fd8,
          0 0 80px #7c3aed;
      }
    }

    @keyframes pop{
      from{
        transform:scale(0.7);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .particles span{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:white;
      opacity:0.6;
      animation:rise linear infinite;
    }

    @keyframes rise{
      from{
        transform:translateY(100vh) scale(0);
      }
      to{
        transform:translateY(-120vh) scale(1);
      }
    }

    @media(max-width:768px){
      .countdown{
        grid-template-columns:repeat(2,1fr);
        gap:15px;
      }

      .box{
        padding:22px 10px;
      }
    }

    @media(max-width:420px){
      .countdown{
        gap:12px;
      }

      .box{
        border-radius:18px;
      }
    }
  </style>
</head>

<body>

  <div class="glow"></div>
  <div class="glow"></div>

  <div class="particles">
    <span style="left:10%; animation-duration:10s;"></span>
    <span style="left:20%; animation-duration:14s;"></span>
    <span style="left:35%; animation-duration:12s;"></span>
    <span style="left:50%; animation-duration:16s;"></span>
    <span style="left:65%; animation-duration:13s;"></span>
    <span style="left:75%; animation-duration:11s;"></span>
    <span style="left:90%; animation-duration:15s;"></span>
  </div>

  <div class="container">

    <div id="countdownSection">
      <div class="title">Birthday Countdown</div>
      <div class="subtitle">Something special is coming</div>

      <div class="countdown">

        <div class="box">
          <div class="number" id="days">00</div>
          <div class="label">Days</div>
        </div>

        <div class="box">
          <div class="number" id="hours">00</div>
          <div class="label">Hours</div>
        </div>

        <div class="box">
          <div class="number" id="minutes">00</div>
          <div class="label">Minutes</div>
        </div>

        <div class="box">
          <div class="number" id="seconds">00</div>
          <div class="label">Seconds</div>
        </div>

      </div>
    </div>

    <div class="birthday" id="birthdayMessage">
      <h1>Happy Birthday</h1>
      <p>Wishing you happiness, success & endless smiles</p>
    </div>

  </div>

  <script>
    // Set target date
    const targetDate = new Date("May 10, 2026 00:00:00").getTime();

    const days = document.getElementById("days");
    const hours = document.getElementById("hours");
    const minutes = document.getElementById("minutes");
    const seconds = document.getElementById("seconds");

    const countdownSection = document.getElementById("countdownSection");
    const birthdayMessage = document.getElementById("birthdayMessage");

    const timer = setInterval(() => {

      const now = new Date().getTime();
      const distance = targetDate - now;

      if(distance <= 0){
        clearInterval(timer);

        countdownSection.style.display = "none";
        birthdayMessage.style.display = "block";

        return;
      }

      const d = Math.floor(distance / (1000 * 60 * 60 * 24));
      const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((distance % (1000 * 60)) / 1000);

      days.innerHTML = String(d).padStart(2, '0');
      hours.innerHTML = String(h).padStart(2, '0');
      minutes.innerHTML = String(m).padStart(2, '0');
      seconds.innerHTML = String(s).padStart(2, '0');

    }, 1000);
  </script>

</body>
</html>

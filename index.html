<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Countdown</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      font-family:'Poppins',sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(-45deg,#0f172a,#111827,#1e1b4b,#312e81);
      background-size:400% 400%;
      animation:gradientBG 12s ease infinite;
      color:#fff;
      position:relative;
    }

    @keyframes gradientBG{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .glow{
      position:absolute;
      width:500px;
      height:500px;
      background:rgba(99,102,241,0.35);
      filter:blur(120px);
      border-radius:50%;
      animation:float 6s ease-in-out infinite;
    }

    .glow2{
      position:absolute;
      width:400px;
      height:400px;
      background:rgba(236,72,153,0.25);
      filter:blur(120px);
      border-radius:50%;
      bottom:-100px;
      right:-100px;
      animation:float2 8s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-40px)}
    }

    @keyframes float2{
      0%,100%{transform:translateX(0)}
      50%{transform:translateX(-50px)}
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      padding:40px;
      width:90%;
      max-width:1100px;
    }

    .title{
      font-size:60px;
      font-weight:700;
      margin-bottom:12px;
      background:linear-gradient(90deg,#fff,#c4b5fd,#f9a8d4);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.03)}
    }

    .subtitle{
      font-size:20px;
      color:#d1d5db;
      margin-bottom:60px;
      letter-spacing:1px;
    }

    .countdown{
      display:flex;
      justify-content:center;
      gap:25px;
      flex-wrap:wrap;
    }

    .time-box{
      width:200px;
      height:220px;
      border-radius:30px;
      backdrop-filter:blur(18px);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.35),
        inset 0 0 20px rgba(255,255,255,0.05);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      transition:0.4s ease;
      position:relative;
      overflow:hidden;
    }

    .time-box::before{
      content:'';
      position:absolute;
      top:-50%;
      left:-50%;
      width:200%;
      height:200%;
      background:linear-gradient(
        45deg,
        transparent,
        rgba(255,255,255,0.08),
        transparent
      );
      transform:rotate(25deg);
      animation:shine 5s linear infinite;
    }

    @keyframes shine{
      0%{transform:translateX(-100%) rotate(25deg)}
      100%{transform:translateX(100%) rotate(25deg)}
    }

    .time-box:hover{
      transform:translateY(-10px) scale(1.03);
      box-shadow:0 15px 40px rgba(99,102,241,0.45);
    }

    .number{
      font-size:72px;
      font-weight:700;
      line-height:1;
    }

    .label{
      margin-top:14px;
      font-size:18px;
      text-transform:uppercase;
      letter-spacing:3px;
      color:#cbd5e1;
    }

    .footer{
      margin-top:50px;
      font-size:18px;
      color:#e5e7eb;
      opacity:0.9;
      letter-spacing:1px;
    }

    .birthday-screen{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      text-align:center;
      animation:fadeIn 2s ease;
    }

    .birthday-title{
      font-size:90px;
      font-weight:700;
      background:linear-gradient(90deg,#fff,#f9a8d4,#c4b5fd,#fff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:pulse 2s infinite;
    }

    .birthday-subtitle{
      margin-top:20px;
      font-size:24px;
      color:#e5e7eb;
      letter-spacing:2px;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:scale(0.9);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @media(max-width:768px){

      .title{
        font-size:40px;
      }

      .subtitle{
        font-size:16px;
        margin-bottom:35px;
      }

      .countdown{
        gap:15px;
      }

      .time-box{
        width:150px;
        height:170px;
      }

      .number{
        font-size:52px;
      }

      .label{
        font-size:14px;
      }

      .birthday-title{
        font-size:52px;
      }

      .birthday-subtitle{
        font-size:18px;
      }
    }

  </style>
</head>

<body>

  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="container">

    <div class="title">
      Countdown Begins
    </div>

    <div class="subtitle">
      Sunday, 10 May • 12:00 AM
    </div>

    <div class="countdown">

      <div class="time-box">
        <div class="number" id="days">00</div>
        <div class="label">Days</div>
      </div>

      <div class="time-box">
        <div class="number" id="hours">00</div>
        <div class="label">Hours</div>
      </div>

      <div class="time-box">
        <div class="number" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>

      <div class="time-box">
        <div class="number" id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>

    </div>

    <div class="footer">
      Something beautiful is about to happen ✨
    </div>

  </div>

  <script>

    // TARGET DATE
    const targetDate = new Date("May 10, 2026 00:00:00").getTime();

    const days = document.getElementById("days");
    const hours = document.getElementById("hours");
    const minutes = document.getElementById("minutes");
    const seconds = document.getElementById("seconds");

    function updateCountdown(){

      const now = new Date().getTime();
      const distance = targetDate - now;

      // WHEN COUNTDOWN ENDS
      if(distance < 0){

        document.querySelector(".container").innerHTML = `

          <div class="birthday-screen">

            <div class="birthday-title">
              Happy Birthday ✨
            </div>

            <div class="birthday-subtitle">
              Wishing you happiness, love & endless vibes 🎉
            </div>

          </div>

        `;

        return;
      }

      const d = Math.floor(distance / (1000 * 60 * 60 * 24));
      const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((distance % (1000 * 60)) / 1000);

      days.innerHTML = String(d).padStart(2, '0');
      hours.innerHTML = String(h).padStart(2, '0');
      minutes.innerHTML = String(m).padStart(2, '0');
      seconds.innerHTML = String(s).padStart(2, '0');
    }

    setInterval(updateCountdown,1000);
    updateCountdown();

  </script>

</body>
</html>
